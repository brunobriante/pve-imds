name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: canonical/cloud-init
          path: cloud-init
      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends $(cat .github/apt-packages.txt)
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: goreleaser build --snapshot
      - run: mise run lint
      - run: mise run test
      - run: mise run test-conformance
        env:
          CLOUD_INIT_DIR: ${{ github.workspace }}/cloud-init
